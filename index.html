<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Eletiva: Corpo em Movimento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        :root {
            --primary: #12002b; 
            --accent: #ff007f; 
            --accent-cyan: #00f3ff;
            --bg-gradient: linear-gradient(135deg, #0e001f 0%, #1a003c 100%);
            --white: #ffffff;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
            --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #bgCanvas { 
            position: fixed; 
            inset: 0; 
            z-index: -1; 
            opacity: 0.25; 
            pointer-events: none; 
        }

        /* Cursores Personalizados de Alta Performance */
        #cursor {
            width: 8px; height: 8px; background: var(--accent-cyan);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%); transition: width 0.15s, height 0.15s;
            box-shadow: 0 0 10px var(--accent-cyan);
        }
        #cursor-follower {
            width: 36px; height: 36px; border: 1.5px solid var(--accent);
            border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); transition: transform 0.15s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.2);
        }

        .stage {
            width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }

        .slider-container { width: 100%; max-width: 1400px; height: 85vh; position: relative; }

        .slide {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; opacity: 0; visibility: hidden;
            transform: scale(0.96) translateY(20px); transition: all 0.8s var(--ease-smooth);
        }
        .slide.active { opacity: 1; visibility: visible; transform: scale(1) translateY(0); }

        /* Estilo da Capa (Slide 1) */
        .cover-content {
            text-align: center;
            max-width: 1000px;
            animation: pulseBg 8s infinite alternate;
            padding: 40px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .cover-badge {
            display: inline-block; padding: 6px 18px; 
            background: linear-gradient(90deg, var(--accent) 0%, #a200ff 100%);
            color: white; border-radius: 50px; font-size: 0.9rem; font-weight: 800;
            margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
        }
        .cover-title {
            font-size: 4.5rem; font-weight: 900; line-height: 1.1;
            background: linear-gradient(135deg, #fff 30%, var(--accent-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px; letter-spacing: -1px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cover-professor {
            font-size: 1.8rem; color: var(--text-light); font-weight: 500;
            opacity: 0.9; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .cover-professor span { color: var(--accent-cyan); font-weight: 700; }

        /* Galeria / Fotos (Slide 2) */
        .gallery-container {
            width: 100%; height: 100%; display: grid;
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 15px; padding: 10px;
        }
        .gallery-item {
            position: relative; border-radius: 16px; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03);
            transition: all 0.4s var(--ease-smooth); box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .gallery-item:nth-child(1) { grid-column: span 2; grid-row: span 2; }
        .gallery-item:nth-child(2) { grid-column: span 2; }
        .gallery-item:hover { transform: scale(1.03); border-color: var(--accent-cyan); z-index: 5; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-badge {
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.75);
            padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;
            color: var(--accent-cyan); border: 1px solid rgba(0,243,255,0.3);
        }

        /* Layout para Vídeos e Imagem Unica */
        .media-header {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding: 0 10px;
        }
        .media-title {
            font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 10px;
            color: var(--text-light); text-transform: uppercase; letter-spacing: 1px;
        }
        .media-title i { color: var(--accent); }
        .media-filename {
            font-family: monospace; font-size: 0.85rem; color: var(--accent-cyan);
            background: rgba(0, 243, 255, 0.1); padding: 4px 12px; border-radius: 6px;
            border: 1px solid rgba(0, 243, 255, 0.2);
        }
        
        .media-frame {
            width: 100%; height: calc(100% - 60px); border-radius: 20px; overflow: hidden;
            background: #000; border: 3px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .media-frame video, .media-frame img {
            width: 100%; height: 100%; object-fit: contain;
        }

        /* Placeholder Estilizado para Ficheiros em Falta */
        .media-placeholder {
            position: absolute; inset: 0; background: linear-gradient(135deg, #12002b 0%, #29004f 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center; color: var(--text-light);
        }
        .placeholder-icon {
            font-size: 3.5rem; color: var(--accent); margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255,0,127,0.5));
            animation: float 3s ease-in-out infinite;
        }
        .placeholder-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .placeholder-sub { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px; }
        .placeholder-path {
            font-family: monospace; background: rgba(0,0,0,0.4); padding: 5px 12px;
            border-radius: 6px; font-size: 0.8rem; border: 1px dashed rgba(255,255,255,0.1);
        }

        /* Slide de Agradecimento (Slide Final) */
        .thanks-card {
            text-align: center; max-width: 900px; padding: 50px; border-radius: 24px;
            background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(15px); position: relative; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        .thanks-card::before {
            content: ''; position: absolute; inset: 0; border-radius: 24px;
            padding: 2px; background: linear-gradient(135deg, var(--accent), var(--accent-cyan));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
        }
        .thanks-title {
            font-size: 6rem; font-weight: 900; margin-bottom: 20px;
            background: linear-gradient(90deg, #fff 0%, var(--accent) 50%, var(--accent-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -2px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }
        .thanks-sub {
            font-size: 1.5rem; color: var(--text-light); opacity: 0.8; font-weight: 500;
            letter-spacing: 1px;
        }

        /* Interface e Navegação */
        .progress-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.05); z-index: 1000; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent) 0%, var(--accent-cyan) 100%); width: 0%; transition: width 0.3s ease; }

        .nav-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 30px; padding: 12px 30px;
            background: rgba(18, 0, 43, 0.7); border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000;
        }
        .nav-btn {
            background: none; border: none; color: var(--text-light); font-size: 1.2rem;
            width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s var(--ease-smooth);
        }
        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1); color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }
        .count { font-family: 'Inter', sans-serif; font-weight: 800; color: var(--text-light); font-size: 1rem; letter-spacing: 1px; }

        /* Animações */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulseBg {
            0% { box-shadow: 0 0 40px rgba(255,0,127,0.1); }
            100% { box-shadow: 0 0 70px rgba(0,243,255,0.15); }
        }

        /* Responsividade */
        @media (max-width: 900px) {
            .cover-title { font-size: 2.8rem; }
            .thanks-title { font-size: 3.8rem; }
            .gallery-container { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(4, 1fr); }
            .gallery-item:nth-child(1) { grid-column: span 2; grid-row: span 2; }
            .media-header { flex-direction: column; align-items: flex-start; gap: 8px; }
        }
    </style>
</head>
<body>

    <!-- Linha de Progresso Superior -->
    <div class="progress-wrap"><div class="progress-bar" id="pBar"></div></div>
    
    <!-- Canvas Dinâmico para Efeito de Movimento no Fundo -->
    <canvas id="bgCanvas"></canvas>
    
    <!-- Cursor Personalizado para Computadores de Apresentação -->
    <div id="cursor"></div>
    <div id="cursor-follower"></div>

    <!-- Palco Principal de Slides -->
    <div class="stage">
        <div class="slider-container" id="slider"></div>
    </div>

    <!-- Barra de Navegação Flutuante -->
    <nav class="nav-bar">
        <button class="nav-btn" id="prevBtn" title="Slide Anterior"><i class="fa-solid fa-arrow-left"></i></button>
        <div class="count" id="counter">1 / 17</div>
        <button class="nav-btn" id="nextBtn" title="Próximo Slide"><i class="fa-solid fa-arrow-right"></i></button>
    </nav>

    <script>
        (function(){
            "use strict";

            // Configuração do Fundo Interativo em Canvas (Onda cinética de partículas)
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');
            let w = canvas.width = window.innerWidth;
            let h = canvas.height = window.innerHeight;
            const particles = Array.from({length: 45}, () => ({
                x: Math.random() * w,
                y: Math.random() * h,
                radius: Math.random() * 2.5 + 1,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                alpha: Math.random() * 0.5 + 0.2
            }));

            function drawBackground() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 243, 255, ${p.alpha})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "rgba(0, 243, 255, 0.3)";
                    ctx.fill();
                    ctx.shadowBlur = 0; // Reset
                });
                
                // Conectar as partículas próximas com linhas subtis
                for(let i = 0; i < particles.length; i++) {
                    for(let j = i + 1; j < particles.length; j++) {
                        let dist = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(255, 0, 127, ${0.08 * (1 - dist / 120)})`;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(drawBackground);
            }
            drawBackground();

            // Definição da Estrutura dos 17 Slides
            const slideData = [
                {
                    type: "cover",
                    badge: "Eletiva",
                    title: "Corpo em Movimento",
                    professor: "Bruna"
                },
                {
                    type: "gallery",
                    title: "Galeria da Eletiva",
                    badge: "Galeria de Fotos",
                    images: [
                        "assets/foto1.png",
                        "assets/foto2.png",
                        "assets/foto3.png",
                        "assets/foto4.png",
                        "assets/foto5.png"
                    ]
                },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide3.mp4" },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide4.mp4" },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide5.mp4" },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide6.mp4" },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide7.mp4" },
                { type: "image", title: "Apresentação de Prática", file: "assets/slide8.png" },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide9.mp4" },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide10.mp4" },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide11.mp4" },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide12.mp4" },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide13.mp4" },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide14.mp4" },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide15.mp4" },
                { type: "video", title: "Vídeo Demonstrativo", file: "assets/slide16.mp4" },
                {
                    type: "thanks",
                    title: "Obrigado!",
                    subtitle: "Eletiva: Corpo em Movimento • Profª Bruna"
                }
            ];

            const slider = document.getElementById('slider');
            const counter = document.getElementById('counter');
            const pBar = document.getElementById('pBar');
            let currentIndex = 0;

            // Função para injetar belos Placeholders caso os ficheiros locais ainda não existam
            function getPlaceholder(type, filepath) {
                const isVideo = type === 'video';
                return `
                    <div class="media-placeholder">
                        <div class="placeholder-icon">
                            <i class="${isVideo ? 'fa-solid fa-circle-play' : 'fa-regular fa-image'}"></i>
                        </div>
                        <div class="placeholder-text">${isVideo ? 'Ficheiro de Vídeo Preparado' : 'Ficheiro de Imagem Preparado'}</div>
                        <div class="placeholder-sub">Pronto para carregar a partir da sua pasta de recursos</div>
                        <div class="placeholder-path">${filepath}</div>
                    </div>
                `;
            }

            // Construir os slides dinamicamente
            function buildSlides() {
                slider.innerHTML = '';
                slideData.forEach((slide, i) => {
                    const slideEl = document.createElement('div');
                    slideEl.className = `slide ${i === 0 ? 'active' : ''}`;
                    
                    if (slide.type === "cover") {
                        slideEl.innerHTML = `
                            <div class="cover-content">
                                <span class="cover-badge">${slide.badge}</span>
                                <h1 class="cover-title">${slide.title}</h1>
                                <p class="cover-professor">Professora: <span>${slide.professor}</span></p>
                            </div>
                        `;
                    } else if (slide.type === "gallery") {
                        let gridItems = "";
                        // Fallback de imagens mock caso as imagens do utilizador não existam ainda
                        slide.images.forEach((img, idx) => {
                            gridItems += `
                                <div class="gallery-item">
                                    <span class="gallery-badge">Registo #${idx + 1}</span>
                                    <img src="${img}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                                    <div class="media-placeholder" style="display:none; padding:10px;">
                                        <i class="fa-regular fa-image" style="font-size:1.8rem; color:var(--accent); margin-bottom:8px;"></i>
                                        <span style="font-size:0.75rem; font-family:monospace; color:var(--text-muted);">${img}</span>
                                    </div>
                                </div>
                            `;
                        });
                        slideEl.innerHTML = `
                            <div class="media-header" style="margin-bottom:25px;">
                                <div class="media-title"><i class="fa-solid fa-camera-retro"></i> ${slide.title}</div>
                                <span class="media-filename">${slide.badge}</span>
                            </div>
                            <div class="gallery-container">${gridItems}</div>
                        `;
                    } else if (slide.type === "video") {
                        slideEl.innerHTML = `
                            <div class="media-header">
                                <div class="media-title"><i class="fa-solid fa-video"></i> Vídeo</div>
                                <span class="media-filename">${slide.file.split('/').pop()}</span>
                            </div>
                            <div class="media-frame">
                                <video src="${slide.file}" controls loop playsinline onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"></video>
                                ${getPlaceholder('video', slide.file)}
                            </div>
                        `;
                    } else if (slide.type === "image") {
                        slideEl.innerHTML = `
                            <div class="media-header">
                                <div class="media-title"><i class="fa-regular fa-image"></i> Imagem</div>
                                <span class="media-filename">${slide.file.split('/').pop()}</span>
                            </div>
                            <div class="media-frame">
                                <img src="${slide.file}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                                ${getPlaceholder('image', slide.file)}
                            </div>
                        `;
                    } else if (slide.type === "thanks") {
                        slideEl.innerHTML = `
                            <div class="thanks-card">
                                <h1 class="thanks-title">${slide.title}</h1>
                                <p class="thanks-sub">${slide.subtitle}</p>
                            </div>
                        `;
                    }
                    
                    slider.appendChild(slideEl);
                });
            }

            // Controlar a navegação inteligente (Gestão de play/pause automático de vídeos)
            function goToSlide(step) {
                const slides = document.querySelectorAll('.slide');
                if (!slides.length) return;

                // Parar vídeo do slide que vai deixar de estar ativo
                const currentSlide = slides[currentIndex];
                const activeVideo = currentSlide.querySelector('video');
                if (activeVideo) {
                    activeVideo.pause();
                }

                // Calcular novo índice circularmente
                currentSlide.classList.remove('active');
                currentIndex = (currentIndex + step + slides.length) % slides.length;
                
                const nextSlide = slides[currentIndex];
                nextSlide.classList.add('active');

                // Reproduzir automaticamente o vídeo do novo slide ativo, caso exista
                const nextVideo = nextSlide.querySelector('video');
                if (nextVideo) {
                    nextVideo.currentTime = 0;
                    nextVideo.play().catch(() => {
                        // Tratar bloqueio de autoplay do navegador caso o vídeo não tenha permissão de som
                        nextVideo.muted = true;
                        nextVideo.play();
                    });
                }

                // Atualizar contador e barra de progresso
                counter.innerText = `${currentIndex + 1} / ${slideData.length}`;
                pBar.style.width = `${((currentIndex + 1) / slideData.length) * 100}%`;
            }

            // Controladores dos botões da interface
            document.getElementById('prevBtn').addEventListener('click', () => goToSlide(-1));
            document.getElementById('nextBtn').addEventListener('click', () => goToSlide(1));

            // Controladores de Teclado (Setas e Espaço)
            document.onkeydown = e => {
                if (e.key === "ArrowRight" || e.key === " ") {
                    e.preventDefault();
                    goToSlide(1);
                }
                if (e.key === "ArrowLeft") {
                    e.preventDefault();
                    goToSlide(-1);
                }
            };

            // Suporte para Navegação por Toque (Swipes para Dispositivos Móveis)
            let touchStartX = 0;
            let touchEndX = 0;
            
            document.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            }, false);

            document.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, false);

            function handleSwipe() {
                const threshold = 50; // Margem de erro mínima para o arrasto ser aceite
                if (touchStartX - touchEndX > threshold) {
                    goToSlide(1); // Deslizou para a esquerda -> Próximo
                } else if (touchEndX - touchStartX > threshold) {
                    goToSlide(-1); // Deslizou para a direita -> Anterior
                }
            }

            // Suave movimento do cursor premium (Apenas para desktop)
            const c = document.getElementById('cursor');
            const f = document.getElementById('cursor-follower');
            
            document.onmousemove = e => {
                c.style.left = e.clientX + 'px'; 
                c.style.top = e.clientY + 'px';
                
                // Suavização do movimento do círculo externo (Seguidor)
                f.animate({
                    left: e.clientX + 'px',
                    top: e.clientY + 'px'
                }, { duration: 250, fill: "forwards" });
            };

            // Feedback visual nos botões interativos para o cursor
            const interactiveElements = document.querySelectorAll('.nav-btn, video, img');
            interactiveElements.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    c.style.transform = 'translate(-50%, -50%) scale(2.5)';
                    f.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    f.style.borderColor = 'var(--accent-cyan)';
                });
                el.addEventListener('mouseleave', () => {
                    c.style.transform = 'translate(-50%, -50%) scale(1)';
                    f.style.transform = 'translate(-50%, -50%) scale(1)';
                    f.style.borderColor = 'var(--accent)';
                });
            });

            // Ajuste do Canvas caso o ecrã seja redimensionado
            window.addEventListener('resize', () => {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            });

            // Inicializar a apresentação
            buildSlides();
            pBar.style.width = `${(1 / slideData.length) * 100}%`;

        })();
    </script>
</body>
</html>
